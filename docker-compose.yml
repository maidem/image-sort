services:
  app:
    image: ghcr.io/maidem/image-sort:latest
    container_name: image-sort
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss gesetzt sein}@db:5432/imagesort
      - UPLOAD_PATH=/data/uploads
      - ADMIN_EMAIL=${ADMIN_EMAIL:?ADMIN_EMAIL muss gesetzt sein}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD muss gesetzt sein}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET muss gesetzt sein}
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: image-sort-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=imagesort
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss gesetzt sein}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d imagesort"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  uploads:
  pgdata:
