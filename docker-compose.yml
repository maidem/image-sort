services:
  app:
    image: ghcr.io/maidem/trainerbelegungsplan:latest
    container_name: trainerbelegungsplan
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/app.db
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD muss gesetzt sein}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET muss gesetzt sein
        (openssl rand -hex 32)}
    volumes:
      - app_data:/data

volumes:
  app_data:
